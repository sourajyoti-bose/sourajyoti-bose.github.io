<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ site.baseurl }}/" class="site-header__logo">{{ site.title }}</a>

    <nav class="site-header__nav" aria-label="Main navigation">
      {% for link in site.nav_links %}
        <a
          href="{{ link.url | relative_url }}"
          class="site-header__nav-link{% if page.url == link.url or page.url contains link.url and link.url != '/' %} active{% elsif page.url == '/' and link.url == '/' %} active{% endif %}"
        >{{ link.title }}</a>
      {% endfor %}
    </nav>

    <div class="site-header__icons">
      {% if site.author.github %}
        <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener" aria-label="GitHub">
          <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </a>
      {% endif %}
      {% if site.author.email %}
        <a href="mailto:{{ site.author.email }}" aria-label="Email">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </a>
      {% endif %}

      <button class="site-header__mobile-toggle" id="mobileToggle" aria-label="Open menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>
  </div>
</header>

<div class="mobile-nav" id="mobileNav">
  <button class="mobile-nav__close" id="mobileClose" aria-label="Close menu">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
  </button>
  <div class="mobile-nav__links">
    {% for link in site.nav_links %}
      <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
    {% endfor %}
  </div>
</div>
